document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"c94d273b-c93e-47fc-968e-8c29017132a8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6a3de79b-430b-45f8-8b74-cf4f4a9af6ca\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"c94d273b-c93e-47fc-968e-8c29017132a8\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Outfit';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"6a3de79b-430b-45f8-8b74-cf4f4a9af6ca\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\/style>\n<script src=\"54c405b9-16d1-4d35-ab62-6f048065ba1c\"><\/script>\n\n<script type=\"application/json\" id=\"speaker-notes\">\n[\n  \"Good morning, everyone. Welcome to Paris. It is a pleasure to be here with twenty of the sharpest minds in innovation. Today is not about listening to me talk \u2014 it's about experiencing the future of how we test ideas. We have exactly 90 minutes to explore how we can move from guessing to simulating the success of your next big innovation.\",\n\n  \"Strategy Quest builds high-fidelity business simulations where leaders make real decisions against AI-powered stakeholders. We compress years of strategic experience into hours of high-pressure practice. The result: faster decision-making, sharper foresight, and teams that are genuinely aligned before the real decisions land.\",\n  \"We're not a new idea. We work with Sanofi, ING, Emirates, NatWest, PA Consulting \u2014 teams who operate at the edge of uncertainty and cannot afford to get their strategy wrong. What they tell us, consistently, is that the simulation surfaces misalignments that months of workshops never found.\",\n  \"You've been reading the headlines. But let me show you the structural forces, not just the news cycle. Two tectonic shifts are happening simultaneously \u2014 and they're compounding each other. Environmental breakdown and geopolitical fragmentation. Both are reshaping the strategic terrain for innovation leaders right now.\",\n  \"Artificial Intelligence is the third tectonic force \u2014 and unlike the others, it's moving at software speed. It's not coming. It's here. Agentic AI systems are already rewriting competitive dynamics in finance, logistics, healthcare, manufacturing. The organisations that understand this and build simulation-based learning environments will navigate it. The ones that don't will be overtaken by ones that do.\"\n,\n  \"On the environmental side, the data is stark. We're already at 1.2 degrees above pre-industrial levels. Climate disruption is already affecting supply chains, regulatory pressure, and stakeholder expectations. On biodiversity, a million species face extinction \u2014 and the ecosystems that underpin agriculture, water, and materials are degrading. These aren't future risks. They're present ones.\",\n  \"The geopolitical picture is equally acute. The frictionless globalisation that underpinned strategy for 30 years is over. We're seeing resource nationalisation, trade bloc fragmentation, nearshoring mandates, and escalating competition over critical minerals and energy. Every planning assumption from 2015 is now up for review.\",\n  \"At Strategy Quest, we don't just use AI to write emails. We build Agentic AI. Unlike traditional AI, these agents have goals, they reason, and they interact. Think of them as digital twins of your stakeholders \u2014 customers, competitors, or board members \u2014 who live and breathe within a simulated ecosystem. They don't just process data; they act on it.\",\n  \"Strategy Quest creates high-fidelity business simulations. We imitate your organisation's entire landscape. Why? Because testing a multi-million euro innovation idea in the real world is expensive and risky. In our simulations, you can fail fast, learn instantly, and refine your strategy before a single cent is spent in reality.\",\n  \"So why simulation? Because knowing about uncertainty and actually deciding under it are completely different cognitive experiences. Simulations put your team inside the pressure \u2014 budget constraints, stakeholder resistance, competitive moves. You don't just learn faster. The learning sticks. Four times faster than classroom training.\",\n  \"Here's our programme for the morning. 90 minutes, four phases. Two simulation rounds, then you become the designers \u2014 you'll build your own simulation scenario. It's a tight programme but a rich one. Let's walk through it.\",\n  \"The simulation runs in phases. Each round you receive a briefing, make strategic decisions, and interact with AI-powered stakeholders who respond to your choices in real time. Your decisions shape the world you operate in next round. There are no right answers \u2014 only trade-offs.\",\n  \"Find your partners. Look for diverse perspectives. Once you are seated, log into the simulation portal. Your agents are waiting.\",\n  \"Now, the floor is yours. Round one: Build your first strategy. Pitch it to your digital stakeholders within the sim. Listen to their feedback. Are the agents buying what you're selling? Adjust your move. You have 20 minutes.\",\n  \"In innovation, the biggest threat isn't your competitor \u2014 it's the disruption you didn't see coming. Our simulations include Scenario Planning triggers. We are about to hit your strategies with a market disruption. Let's see if your strategy survives the shock.\",\n  \"The market has changed. A disruption has been introduced into your simulation. You have 10 minutes to pivot. Refine your strategy to ensure resilience. This is where the winners are separated from the rest.\",\n  \"For the final 35 minutes, we go deep. You will receive a specific briefing from your digital company stakeholders. Your assignment: create a full-scale simulation strategy that addresses the disruption and satisfies the internal agents. Good luck \u2014 the digital board is watching.\",\n  \"Thank you for your energy today. You've seen how Agentic AI can transform strategy from a static document into a living, breathing laboratory. Visit strategy-quest.com to see how we can bring this to your organisation.\"\n]\n<\/script>\n\n<style>\n:root {\n  --bg:     #0b0b13;\n  --bg2:    #0d0d1a;\n  --card:   rgba(255,255,255,0.04);\n  --border: rgba(255,255,255,0.09);\n  --violet: #6B5CE7;\n  --vlight: #9B8FFF;\n  --amber:  #F5A500;\n  --text:   #FFFFFF;\n  --muted:  rgba(255,255,255,0.45);\n  --faint:  rgba(255,255,255,0.07);\n}\n\n* { box-sizing: border-box; margin: 0; padding: 0; }\nbody { background: #000; font-family: 'Outfit', sans-serif; color: var(--text); }\n\nsection {\n  width: 100%; height: 100%;\n  background: var(--bg);\n  padding: 96px 120px 80px;\n  display: flex;\n  flex-direction: column;\n  overflow: hidden;\n  position: relative;\n}\nsection.no-pad { padding: 0; }\nsection.centered { justify-content: center; align-items: center; text-align: center; padding: 80px; }\n\n/* Top gradient bar */\nsection::before {\n  content: '';\n  position: absolute;\n  top: 0; left: 0; right: 0; height: 3px;\n  background: linear-gradient(90deg, var(--violet), var(--amber));\n  z-index: 10;\n}\n\n/* TYPE SCALE */\n.t-hero  { font-size: 96px;  font-weight: 800; line-height: 1.0; }\n.t-title { font-size: 64px;  font-weight: 700; line-height: 1.1; }\n.t-sub   { font-size: 44px;  font-weight: 500; line-height: 1.3; }\n.t-body  { font-size: 34px;  font-weight: 400; line-height: 1.5; }\n.t-small { font-size: 28px;  font-weight: 400; }\n.t-label { font-size: 24px;  font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }\n.t-stat  { font-size: 80px;  font-weight: 800; line-height: 1; }\n.t-timer { font-size: 168px; font-weight: 800; line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -6px; }\n\n.violet { color: var(--vlight); }\n.amber  { color: var(--amber); }\n.muted  { color: var(--muted); }\n\n.card {\n  background: var(--card);\n  border: 1px solid var(--border);\n  border-radius: 16px;\n  padding: 36px;\n}\n\n.divider { width: 56px; height: 4px; background: var(--amber); border-radius: 2px; margin: 28px 0; }\n\n.slide-label { font-size: 24px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 24px; color: var(--vlight); }\n\n.step-tag {\n  display: inline-block;\n  font-size: 24px; font-weight: 700; letter-spacing: 0.1em;\n  text-transform: uppercase;\n  background: rgba(107,92,231,0.14);\n  color: var(--vlight);\n  padding: 6px 14px; border-radius: 8px;\n  margin-bottom: 16px;\n}\n\n/* Grid layouts */\n.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }\n.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 36px; }\n.g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 28px; }\n\n/* Timeline */\n.tl-row { display: flex; align-items: center; gap: 28px; padding: 20px 0; border-bottom: 1px solid var(--faint); }\n.tl-time { font-size: 26px; font-weight: 600; color: var(--amber); min-width: 88px; font-variant-numeric: tabular-nums; }\n.tl-dot  { width: 10px; height: 10px; border-radius: 50%; background: var(--violet); flex-shrink: 0; }\n.tl-name { font-size: 30px; font-weight: 500; flex: 1; }\n.tl-dur  { font-size: 24px; color: var(--muted); }\n\n/* Big BG number watermark for round slides */\n.bg-num {\n  position: absolute; right: 60px; top: 50%; transform: translateY(-50%);\n  font-size: 460px; font-weight: 900; line-height: 1;\n  opacity: 0.05; user-select: none; pointer-events: none;\n  color: var(--violet);\n}\n\n/* Globe container */\n.bg-globe {\n  position: absolute; right: -80px; top: 50%;\n  transform: translateY(-50%);\n  opacity: 0.18; pointer-events: none;\n}\n\n/* Buttons */\n.btn {\n  border: none; border-radius: 12px;\n  font-family: 'Outfit', sans-serif;\n  font-size: 26px; font-weight: 600;\n  padding: 14px 36px; cursor: pointer;\n  transition: filter 0.2s;\n  background: var(--violet); color: #fff;\n}\n.btn:hover { filter: brightness(1.2); }\n.btn.amber-btn { background: var(--amber); color: #000; }\n.btn.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }\n\n@keyframes flashDone { 0%,100%{opacity:1} 50%{opacity:0.15} }\n\n@keyframes headline-in {\n  from { opacity:0; transform:translateY(20px); letter-spacing:0.08em; }\n  to   { opacity:1; transform:translateY(0);    letter-spacing:normal; }\n}\n@keyframes glow-pulse {\n  0%,100% { opacity:0.22; }\n  50%      { opacity:0.42; }\n}\n@keyframes fade-up {\n  from { opacity:0; transform:translateY(22px); }\n  to   { opacity:1; transform:translateY(0); }\n}\n.stat-badge { display:inline-flex;align-items:center;gap:10px;padding:14px 30px;border-radius:999px;border:1px solid;font-size:26px;font-weight:600;white-space:nowrap; }\n.stat-badge.violet { border-color:rgba(155,143,255,.45);background:rgba(107,92,231,.13);color:#9B8FFF;box-shadow:0 0 24px rgba(107,92,231,.28); }\n.stat-badge.amber  { border-color:rgba(245,165,0,.45);  background:rgba(245,165,0,.11);  color:#F5A500;box-shadow:0 0 24px rgba(245,165,0,.22); }\n.stat-badge.cyan   { border-color:rgba(0,212,240,.45);  background:rgba(0,212,240,.09);  color:#00D4F0;box-shadow:0 0 24px rgba(0,212,240,.20); }\n@keyframes tl-fade-in { from { opacity:0; transform:translateY(-14px); } to { opacity:1; transform:translateY(0); } }\n.tl-fade { opacity:0; animation:tl-fade-in 1.0s cubic-bezier(.22,.61,.36,1) forwards; will-change:opacity,transform; }\n/* Batch 1: rows 1-3, tight stagger */\n.tl-fade-1 { animation-delay: 2s; }\n.tl-fade-2 { animation-delay: 2.4s; }\n.tl-fade-3 { animation-delay: 2.8s; }\n/* 5s pause after batch 1 finishes (~1.8s), batch 2: rows 4-6 */\n.tl-fade-4 { animation-delay: 8.8s; }\n.tl-fade-5 { animation-delay: 9.2s; }\n.tl-fade-6 { animation-delay: 9.6s; }\n/* 10s pause after batch 2 finishes (~8.6s), final row */\n.tl-fade-7 { animation-delay: 20.6s; }\n@keyframes badge-breathe {\n  0%, 100% { transform:translateY(0) scale(1); filter:brightness(1); }\n  50%      { transform:translateY(-2px) scale(1.025); filter:brightness(1.22); }\n}\n@keyframes bubble-in { from { opacity:0; transform:translateY(-12px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }\n.quote-bubble { opacity:0; animation:bubble-in 0.9s cubic-bezier(.22,1.4,.36,1) 1.2s forwards; transform-origin:top right; }\n@keyframes card-slide-in { from { opacity:0; transform:translateX(80px); } to { opacity:1; transform:translateX(0); } }\n.card-slide { opacity:0; animation:card-slide-in 0.9s cubic-bezier(.22,.61,.36,1) forwards; will-change:opacity,transform; }\n.card-slide-1 { animation-delay: 0s; }\n.card-slide-2 { animation-delay: 1.2s; }\n.card-slide-3 { animation-delay: 2.4s; }\n.card-slide-4 { animation-delay: 3.6s; }\n.badge-anim { animation:badge-breathe 3.8s ease-in-out infinite; will-change:transform,filter; }\n.badge-anim-1 { animation-delay: 0s; }\n.badge-anim-2 { animation-delay: -1.27s; }\n.badge-anim-3 { animation-delay: -2.53s; }\n.hero-anim   { animation:headline-in 1.0s cubic-bezier(.16,1,.3,1) .30s both; }\n.fade-anim-1 { animation:fade-up .7s cubic-bezier(.16,1,.3,1) .10s both; }\n.fade-anim-2 { animation:fade-up .7s cubic-bezier(.16,1,.3,1) .40s both; }\n.fade-anim-3 { animation:fade-up .7s cubic-bezier(.16,1,.3,1) .60s both; }\n.fade-anim-4 { animation:fade-up .7s cubic-bezier(.16,1,.3,1) .78s both; }\n.fade-anim-5 { animation:fade-up .7s cubic-bezier(.16,1,.3,1) .96s both; }\n.card-anchor { box-shadow:0 0 36px rgba(0,212,240,.24)!important;border-color:rgba(0,212,240,.35)!important; }\n<\/style>\n\n<\/head>\n<body>\n<deck-stage width=\"1920\" height=\"1080\">\n\n<!-- ===== 00 HOOK ===== -->\n\n\n<!-- ===== 00 HOOK ===== -->\n<section class=\"centered\" data-label=\"00 Hook\" style=\"background:#050509\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(107,92,231,.14) 0%,transparent 68%);pointer-events:none;animation:glow-pulse 4s ease-in-out infinite\"><\/div>\n  <div style=\"max-width:1060px;text-align:center;position:relative;z-index:1\">\n    <p style=\"font-size:54px;font-weight:800;line-height:1.32;color:#fff;margin-bottom:52px;animation:fade-up 1s cubic-bezier(.16,1,.3,1) .05s both\">\n      In 2023, <span style=\"color:#9B8FFF\">70% of strategic initiatives<\/span> failed.\n    <\/p>\n    <p style=\"font-size:54px;font-weight:800;line-height:1.32;color:rgba(255,255,255,.50);margin-bottom:52px;animation:fade-up 1s cubic-bezier(.16,1,.3,1) .60s both\">\n      Not because the strategy was bad.\n    <\/p>\n    <p style=\"font-size:54px;font-weight:800;line-height:1.32;color:#fff;animation:fade-up 1s cubic-bezier(.16,1,.3,1) 1.15s both\">\n      Because leaders and teams pulled<br><span style=\"color:#F5A500\">in different directions.<\/span>\n    <\/p>\n  <\/div>\n<\/section>\n\n<!-- ===== 08 PROGRAMME ===== -->\n<section class=\"no-pad\" data-label=\"11 Programme\" style=\"flex-direction:row\">\n  <!-- Left panel -->\n  <div style=\"flex:0 0 580px;background:rgba(107,92,231,0.07);display:flex;flex-direction:column;justify-content:center;padding:96px 72px;border-right:1px solid var(--border)\">\n    <div class=\"slide-label\">Schedule<\/div>\n    <h2 class=\"t-title\" style=\"margin-bottom:24px\">Today's<br>Programme<\/h2>\n    <p class=\"t-body muted\" style=\"line-height:1.7\">90 minutes<br>Paris &middot; 12 May 2026<br>13:45 &ndash; 15:15<\/p>\n    <div class=\"divider\"><\/div>\n    <p class=\"t-small muted\" style=\"margin-bottom:16px\">Two simulation rounds, plus hands-on simulation design.<\/p>\n    <p class=\"t-small\" style=\"color:rgba(155,143,255,0.7);line-height:1.5\">&#8635; As a Participant, you can restart your Quest and continue independently at home or in the office after today.<\/p>\n  <\/div>\n  <!-- Timeline -->\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:72px 96px\">\n    <div class=\"tl-row tl-fade tl-fade-1\" style=\"border-top:1px solid var(--faint)\">\n      <span class=\"tl-time\">13:45<\/span><div class=\"tl-dot\"><\/div>\n      <span class=\"tl-name\">Welcome<\/span><span class=\"tl-dur\">5 min<\/span>\n    <\/div>\n    <div class=\"tl-row tl-fade tl-fade-2\">\n      <span class=\"tl-time\">13:50<\/span><div class=\"tl-dot\"><\/div>\n      <span class=\"tl-name\">Introduction to the interactive session<\/span><span class=\"tl-dur\">5 min<\/span>\n    <\/div>\n    <div class=\"tl-row tl-fade tl-fade-3\">\n      <span class=\"tl-time\">13:55<\/span><div class=\"tl-dot\"><\/div>\n      <span class=\"tl-name\">Introduction to Strategy Quest<\/span><span class=\"tl-dur\">10 min<\/span>\n    <\/div>\n    <div class=\"tl-row tl-fade tl-fade-4\">\n      <span class=\"tl-time\">14:05<\/span><div class=\"tl-dot\" style=\"background:var(--amber)\"><\/div>\n      <span class=\"tl-name\">Team formation<\/span><span class=\"tl-dur\">5 min<\/span>\n    <\/div>\n    <div class=\"tl-row tl-fade tl-fade-5\">\n      <span class=\"tl-time\">14:10<\/span><div class=\"tl-dot\" style=\"background:var(--amber)\"><\/div>\n      <span class=\"tl-name\">Round 1 &mdash; stakeholder interaction, strategy design, feedback &amp; final strategy<\/span><span class=\"tl-dur\">25 min<\/span>\n    <\/div>\n    <div class=\"tl-row tl-fade tl-fade-6\">\n      <span class=\"tl-time\">14:35<\/span><div class=\"tl-dot\" style=\"background:var(--amber)\"><\/div>\n      <span class=\"tl-name\">Round 2 &mdash; jump to the future: new update, reflect &amp; adapt<\/span><span class=\"tl-dur\">15 min<\/span>\n    <\/div>\n    <div class=\"tl-row tl-fade tl-fade-7\">\n      <span class=\"tl-time\">14:50<\/span><div class=\"tl-dot\" style=\"background:rgba(80,210,120,0.8)\"><\/div>\n      <span class=\"tl-name\">Design your own simulation<\/span><span class=\"tl-dur\">25 min<\/span>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 01 TITLE ===== -->\n<section class=\"centered\" data-label=\"01 Title\" style=\"background:#0b0b13\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 50% 55%,rgba(107,92,231,.26) 0%,transparent 65%);pointer-events:none;animation:glow-pulse 5s ease-in-out .8s infinite\"><\/div>\n  <p class=\"t-label violet fade-anim-1\" style=\"margin-bottom:18px;letter-spacing:.20em;opacity:.75\">EDHEC Business School \u00b7 Paris<\/p>\n  <img src=\"33962f65-be34-4de8-950f-b0793e580596\" style=\"height:90px;mix-blend-mode:screen;margin-bottom:28px\" class=\"fade-anim-2\">\n  <h1 class=\"t-hero hero-anim\" style=\"margin-bottom:18px;max-width:1100px\">There&rsquo;s no safe place<br>to make risky decisions<\/h1>\n  <p class=\"t-sub fade-anim-3\" style=\"margin-bottom:10px;font-weight:700;background:linear-gradient(90deg,#9B8FFF 0%,#F5A500 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text\">Until today.<\/p>\n  <p class=\"t-small muted fade-anim-4\" style=\"margin-bottom:64px;letter-spacing:.04em\">Interactive AI workshop<\/p>\n  <div style=\"display:flex;align-items:center;gap:20px\" class=\"fade-anim-5\">\n    <div class=\"stat-badge violet badge-anim badge-anim-1\">&#9711; 90 min<\/div>\n    <div class=\"stat-badge amber badge-anim badge-anim-2\">&#9889; 2 Simulation Rounds<\/div>\n    <div class=\"stat-badge cyan badge-anim badge-anim-3\">&#10022; Live AI Stakeholders<\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 02 STRATEGY QUEST PITCH ===== -->\n<section data-label=\"02 Strategy Quest\" style=\"background:#09090f;flex-direction:row;gap:0;padding:0\">\n  <!-- Left: big statement -->\n  <div style=\"flex:0 0 860px;display:flex;flex-direction:column;justify-content:center;padding:96px 80px 80px 120px;border-right:1px solid var(--border);position:relative\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 30% 60%, rgba(107,92,231,0.18) 0%, transparent 65%);pointer-events:none\"><\/div>\n    <img src=\"33962f65-be34-4de8-950f-b0793e580596\" style=\"height:60px;width:auto;object-fit:contain;mix-blend-mode:screen;margin-bottom:48px;position:relative;z-index:1\">\n    <h2 style=\"font-size:68px;font-weight:800;line-height:1.1;margin-bottom:32px;position:relative;z-index:1\">Strategy is only<br>learned under pressure.<\/h2>\n    <p class=\"t-body muted\" style=\"max-width:600px;margin-bottom:48px;position:relative;z-index:1\">Strategy Quest builds high-fidelity, context-rich business simulations where professionals have to make real decisions, face real consequences and develop the right instincts \u2013 <em>before<\/em> the stakes get real.<\/p>\n    <div style=\"position:relative;z-index:1;display:flex;align-items:center;gap:20px\">\n      <div style=\"width:6px;height:48px;background:linear-gradient(180deg,#F5A500,#9B8FFF);border-radius:3px\"><\/div>\n      <p style=\"font-size:30px;font-weight:600;line-height:1.25;color:#fff;letter-spacing:-.01em\">It\u2019s like a flight simulator,<br><span style=\"color:#F5A500\">for business.<\/span><\/p>\n      <svg viewBox=\"0 0 24 24\" width=\"56\" height=\"56\" fill=\"#F5A500\" xmlns=\"http://www.w3.org/2000/svg\" aria-hidden=\"true\" style=\"filter:drop-shadow(0 0 16px rgba(245,165,0,.35));flex-shrink:0;transform:rotate(-8deg)\">\n        <path d=\"M22 16v-2l-8.5-5V3.5C13.5 2.67 12.83 2 12 2s-1.5.67-1.5 1.5V9L2 14v2l8.5-2.5V19L8 20.5V22l4-1 4 1v-1.5L13.5 19v-5.5L22 16z\"/>\n      <\/svg>\n    <\/div>\n  <\/div>\n  <!-- Right: 4 value props -->\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:60px 96px 80px;gap:24px\">\n    <p style=\"font-size:20px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.28);margin-bottom:4px\">Trusted by executive teams across the world<\/p>\n    <div class=\"card card-slide card-slide-1\" style=\"display:flex;gap:24px;align-items:flex-start\">\n      <div style=\"width:6px;height:52px;background:linear-gradient(180deg,#9B8FFF,#5040C0);border-radius:3px;flex-shrink:0;margin-top:4px\"><\/div>\n      <div>\n        <div class=\"t-label violet\" style=\"margin-bottom:8px\">Faster Decision-Making<\/div>\n        <div class=\"t-body muted\">Compress years of strategic experience into hours of high-pressure practice.<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"card card-slide card-slide-2\" style=\"display:flex;gap:24px;align-items:flex-start\">\n      <div style=\"width:6px;height:52px;background:linear-gradient(180deg,#F5A500,#B07000);border-radius:3px;flex-shrink:0;margin-top:4px\"><\/div>\n      <div>\n        <div class=\"t-label amber\" style=\"margin-bottom:8px\">Meaningful Feedback<\/div>\n        <div class=\"t-body muted\">AI-powered stakeholders react to every decision \u2014 surfacing blind spots in real time.<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"card card-slide card-slide-3\" style=\"display:flex;gap:24px;align-items:flex-start\">\n      <div style=\"width:6px;height:52px;background:linear-gradient(180deg,#50D278,#208040);border-radius:3px;flex-shrink:0;margin-top:4px\"><\/div>\n      <div>\n        <div class=\"t-label\" style=\"color:rgba(80,210,120,0.9);margin-bottom:8px\">Sharpened Foresight<\/div>\n        <div class=\"t-body muted\">Navigate multi-round scenarios where today's choice shapes tomorrow's landscape.<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"card card-anchor card-slide card-slide-4\" style=\"display:flex;gap:24px;align-items:flex-start\">\n      <div style=\"width:6px;height:52px;background:linear-gradient(180deg,#00D4F0,#007090);border-radius:3px;flex-shrink:0;margin-top:4px\"><\/div>\n      <div>\n        <div class=\"t-label\" style=\"color:#00D4F0;margin-bottom:8px\">Bold Moves Without Risk<\/div>\n        <div class=\"t-body muted\">Test controversial strategies consequence-free before committing real resources.<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 03 PARTICIPANTS ===== -->\n<section data-label=\"03 Participants\" style=\"background:#09090f;flex-direction:column;justify-content:center;align-items:center;padding:80px 120px;gap:0;position:relative\">\n  <div class=\"quote-bubble\" style=\"position:absolute;top:150px;right:56px;width:380px;background:rgba(20,20,28,.94);border:1.5px solid rgba(155,143,255,.42);border-radius:22px;padding:16px 30px 24px;box-shadow:0 14px 42px rgba(107,92,231,.28),0 8px 24px rgba(0,0,0,.55);z-index:5\">\n    <div style=\"font-family:Georgia,&quot;Times New Roman&quot;,serif;font-size:110px;line-height:0.4;color:#9B8FFF;height:48px;opacity:.85;letter-spacing:-.05em;user-select:none\">&ldquo;<\/div>\n    <p style=\"font-size:22px;font-weight:500;line-height:1.45;color:#fff;letter-spacing:-.005em;margin:0\">I would trade my MBA for this immersive learning experience.<\/p>\n    <span style=\"font-family:Georgia,&quot;Times New Roman&quot;,serif;font-size:32px;line-height:0;color:#9B8FFF;opacity:.7;margin-left:4px;vertical-align:-6px\">&rdquo;<\/span>\n    <div aria-hidden=\"true\" style=\"position:absolute;bottom:-11px;left:64px;width:20px;height:20px;background:rgba(20,20,28,.94);border-right:1.5px solid rgba(155,143,255,.42);border-bottom:1.5px solid rgba(155,143,255,.42);transform:rotate(45deg)\"><\/div>\n  <\/div>\n  <div style=\"text-align:center;margin-bottom:64px;position:relative;z-index:1\">\n    <div class=\"slide-label violet\">Trusted By<\/div>\n    <h2 class=\"t-title\" style=\"margin-bottom:20px\">Executive teams across<br>global organisations<\/h2>\n    <p class=\"t-body muted\" style=\"max-width:780px;margin:0 auto\">Operating at the edge of uncertainty &mdash; where strategy must hold under pressure.<\/p>\n  <\/div>\n  <div style=\"width:100%;max-width:1560px;display:grid;grid-template-columns:repeat(3,1fr);gap:36px 48px;align-items:center;justify-items:stretch\">\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/68c16779177ef6c85c1802c1_Sanofi-logo.avif\" alt=\"Sanofi\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/683b596b0ff68ecf10d98c65_ing.avif\" alt=\"ING\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/68bb043f591c096674bb91fa_Culligan_Logo_Blue.avif\" alt=\"Culligan\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/68ac33b99efa38e12441bae3_GitLab_logo.avif\" alt=\"GitLab\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/683b5825e50553e0a634d576_SGS_Logo.svg.avif\" alt=\"SGS\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/68c16ebe1cfe3ada2eea7668_NatWest-logo-transparent.avif\" alt=\"NatWest\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/68c169750e4bd50cf9fd7045_fly-emirates-logo.png\" alt=\"Fly Emirates\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/68c16b25f37f468c0b2a2e6c_PA-Consulting-Group-logo.avif\" alt=\"PA Consulting Group\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n    <div style=\"height:140px;width:100%;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px 28px;box-shadow:0 6px 24px rgba(0,0,0,0.25)\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/68c16b0e6217b4b0bbe54e5d_Nordstrom-Logo.avif\" alt=\"Nordstrom\" style=\"max-height:100%;max-width:100%;object-fit:contain\">\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 04 UNCERTAIN WORLD ===== -->\n<section class=\"no-pad\" data-label=\"04 Uncertain World\" style=\"flex-direction:row\">\n  <!-- Globe -->\n  <div style=\"flex:0 0 860px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, rgba(107,92,231,0.14) 0%, transparent 70%);pointer-events:none\"><\/div>\n    <canvas id=\"globe-main\" width=\"780\" height=\"780\"><\/canvas>\n  <\/div>\n  <!-- Content -->\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:96px 96px 80px 56px\">\n    <div class=\"slide-label\">Context<\/div>\n    <h2 class=\"t-title\" style=\"margin-bottom:28px\">Navigating an<br>Uncertain World<\/h2>\n    <p class=\"t-body muted\" style=\"margin-bottom:40px;max-width:680px\">Three structural forces are simultaneously reshaping the strategic terrain for every organisation.<\/p>\n    <div style=\"display:flex;flex-direction:column;gap:18px\">\n      <div class=\"card\" style=\"display:flex;align-items:center;gap:24px;padding:28px 36px\">\n        <div style=\"width:6px;height:52px;background:linear-gradient(180deg,#9B8FFF,#5040C0);border-radius:3px;flex-shrink:0\"><\/div>\n        <div>\n          <div class=\"t-label\" style=\"color:var(--vlight);margin-bottom:6px\">Environmental<\/div>\n          <div class=\"t-body\">Climate disruption \u00b7 Biodiversity collapse<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"card\" style=\"display:flex;align-items:center;gap:24px;padding:28px 36px\">\n        <div style=\"width:6px;height:52px;background:linear-gradient(180deg,#F5A500,#B07000);border-radius:3px;flex-shrink:0\"><\/div>\n        <div>\n          <div class=\"t-label\" style=\"color:var(--amber);margin-bottom:6px\">Geopolitical<\/div>\n          <div class=\"t-body\">Resource competition \u00b7 Economic fragmentation<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"card\" style=\"display:flex;align-items:center;gap:24px;padding:28px 36px\">\n        <div style=\"width:6px;height:52px;background:linear-gradient(180deg,#00E5FF,#0090A0);border-radius:3px;flex-shrink:0\"><\/div>\n        <div>\n          <div class=\"t-label\" style=\"color:#00D4F0;margin-bottom:6px\">Artificial Intelligence<\/div>\n          <div class=\"t-body\">Power concentration \u00b7 Workforce disruption \u00b7 Speed<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 09 CAN AI DO STRATEGY ===== -->\n<section data-label=\"09 Can AI Do Strategy\" style=\"background:#090b10;flex-direction:row;gap:0;padding:0\">\n  <!-- Left: 3 bullets -->\n  <div style=\"flex:0 0 780px;display:flex;flex-direction:column;justify-content:center;padding:80px 80px 72px 120px;border-right:1px solid var(--border);position:relative;z-index:1\">\n    <div class=\"slide-label\" style=\"color:#F5A500\">HBR Research &middot; March 2026<\/div>\n    <h2 class=\"t-title\" style=\"margin-bottom:20px\">Can AI<br>do strategy?<\/h2>\n    <div class=\"divider\" style=\"background:#F5A500\"><\/div>\n    <div style=\"display:flex;flex-direction:column;gap:20px;margin-top:4px\">\n      <div style=\"display:flex;gap:18px;align-items:flex-start\">\n        <span style=\"color:#F5A500;flex-shrink:0;font-weight:700;font-size:28px;margin-top:2px\">&#8594;<\/span>\n        <span style=\"font-size:27px;line-height:1.45;color:var(--muted)\">LLMs give you <strong style=\"color:#fff\">trendslop<\/strong> &ndash; full of the same buzzwords and conventional wisdom across thousands of prompts, regardless of context.<\/span>\n      <\/div>\n      <div style=\"display:flex;gap:18px;align-items:flex-start\">\n        <span style=\"color:#F5A500;flex-shrink:0;font-weight:700;font-size:28px;margin-top:2px\">&#8594;<\/span>\n        <span style=\"font-size:27px;line-height:1.45;color:var(--muted)\">Better prompting won&rsquo;t fix it. Richer context barely moves the needle. The bias is baked in &ndash; LLMs predict the internet&rsquo;s most popular answer, not the answer <em style=\"color:rgba(255,255,255,0.7)\">your organisation<\/em> needs.<\/span>\n      <\/div>\n      <div style=\"display:flex;gap:18px;align-items:flex-start\">\n        <span style=\"color:#F5A500;flex-shrink:0;font-weight:700;font-size:28px;margin-top:2px\">&#8594;<\/span>\n        <span style=\"font-size:27px;line-height:1.45;color:var(--muted)\">When free to choose, LLMs hedge their bets: &ldquo;do both!&rdquo; Porter was clear &mdash; <em style=\"color:rgba(255,255,255,0.7)\">stuck in the middle<\/em> is a death sentence. Strategy is choosing what <em style=\"color:rgba(255,255,255,0.7)\">not<\/em> to do.<\/span>\n      <\/div>\n    <\/div>\n  <\/div>\n  <!-- Right: bias scoreboard -->\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:72px 96px;gap:16px;position:relative\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 65% 50%,rgba(245,165,0,.07) 0%,transparent 65%);pointer-events:none\"><\/div>\n    <div style=\"position:relative;z-index:1;margin-bottom:6px\">\n      <div class=\"t-label amber\" style=\"margin-bottom:2px\">Every LLM gives the same answer. Every time.<\/div>\n      <div style=\"font-size:20px;color:rgba(255,255,255,0.35);letter-spacing:0.04em\">Strategic recommendations by LLMs across 5 trade-off choices<\/div>\n    <\/div>\n    <!-- Column labels -->\n    <div style=\"display:flex;justify-content:space-between;padding:0 20px;margin-bottom:2px;position:relative;z-index:1\">\n      <span style=\"font-size:19px;color:rgba(255,255,255,0.28);font-weight:600;letter-spacing:0.08em;text-transform:uppercase\">Classical option<\/span>\n      <span style=\"font-size:19px;color:rgba(245,165,0,0.7);font-weight:600;letter-spacing:0.08em;text-transform:uppercase\">LLM picks &#8594;<\/span>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;gap:10px;position:relative;z-index:1\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:16px 20px\">\n        <span class=\"t-small muted\">Cost Leadership<\/span>\n        <span style=\"color:rgba(255,255,255,.2)\">&#9654;<\/span>\n        <span class=\"t-small\" style=\"color:#F5A500;font-weight:600\">Differentiation<\/span>\n      <\/div>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:16px 20px\">\n        <span class=\"t-small muted\">Automation<\/span>\n        <span style=\"color:rgba(255,255,255,.2)\">&#9654;<\/span>\n        <span class=\"t-small\" style=\"color:#F5A500;font-weight:600\">Augmentation<\/span>\n      <\/div>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:16px 20px\">\n        <span class=\"t-small muted\">Short-term<\/span>\n        <span style=\"color:rgba(255,255,255,.2)\">&#9654;<\/span>\n        <span class=\"t-small\" style=\"color:#F5A500;font-weight:600\">Long-term<\/span>\n      <\/div>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:16px 20px\">\n        <span class=\"t-small muted\">Competition<\/span>\n        <span style=\"color:rgba(255,255,255,.2)\">&#9654;<\/span>\n        <span class=\"t-small\" style=\"color:#F5A500;font-weight:600\">Collaboration<\/span>\n      <\/div>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:16px 20px\">\n        <span class=\"t-small muted\">Centralization<\/span>\n        <span style=\"color:rgba(255,255,255,.2)\">&#9654;<\/span>\n        <span class=\"t-small\" style=\"color:#F5A500;font-weight:600\">Decentralization<\/span>\n      <\/div>\n    <\/div>\n    <div style=\"position:relative;z-index:1;display:flex;justify-content:center;margin-top:18px;margin-bottom:4px\">\n    <svg viewBox=\"0 0 220 150\" width=\"180\" height=\"120\" xmlns=\"http://www.w3.org/2000/svg\" fill=\"none\" stroke=\"#F5A500\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\" style=\"filter:drop-shadow(0 0 14px rgba(245,165,0,.28))\">\n      <line x1=\"74\" y1=\"140\" x2=\"146\" y2=\"140\"/>\n      <line x1=\"110\" y1=\"140\" x2=\"110\" y2=\"48\"/>\n      <circle cx=\"110\" cy=\"44\" r=\"4\" fill=\"#F5A500\" stroke=\"none\"/>\n      <line x1=\"44\" y1=\"24\" x2=\"176\" y2=\"78\"/>\n      <line x1=\"44\" y1=\"24\" x2=\"44\" y2=\"46\"/>\n      <path d=\"M 22 46 Q 44 70 66 46\"/>\n      <line x1=\"22\" y1=\"46\" x2=\"66\" y2=\"46\"/>\n      <line x1=\"176\" y1=\"78\" x2=\"176\" y2=\"112\"/>\n      <path d=\"M 148 112 Q 176 142 204 112\"/>\n      <line x1=\"148\" y1=\"112\" x2=\"204\" y2=\"112\"/>\n      <circle cx=\"176\" cy=\"100\" r=\"6\" fill=\"#F5A500\" stroke=\"none\" opacity=\".75\"/>\n      <circle cx=\"168\" cy=\"104\" r=\"4\" fill=\"#F5A500\" stroke=\"none\" opacity=\".55\"/>\n    <\/svg>\n  <\/div>\n  <p class=\"t-small muted\" style=\"margin-top:8px;position:relative;z-index:1\">Romasanta, Thomas &amp; Levina &mdash; 7 LLMs tested, 50 runs each<\/p>\n  <\/div>\n<\/section>\n\n<!-- ===== 09b THE HYBRID TRAP ===== -->\n<section data-label=\"09b Hybrid Trap\" style=\"background:#09090f;flex-direction:row;gap:0;padding:0\">\n  <!-- Left: stat + Porter quote -->\n  <div style=\"flex:0 0 760px;display:flex;flex-direction:column;justify-content:center;padding:80px 72px 72px 120px;border-right:1px solid var(--border);position:relative;z-index:1\">\n    <div class=\"slide-label violet\">The Hybrid Trap<\/div>\n    <h2 class=\"t-title\" style=\"margin-bottom:20px\">AI hedges.<br>Leaders must choose.<\/h2>\n    <div class=\"divider\"><\/div>\n    <div style=\"display:flex;align-items:center;gap:24px;margin-bottom:32px\">\n      <span style=\"font-size:88px;font-weight:800;color:var(--vlight);line-height:1;flex-shrink:0\">24%<\/span>\n      <span style=\"font-size:26px;color:var(--muted);line-height:1.4\">of free-choice LLM responses recommend &ldquo;do both&rdquo; &mdash; differentiate <em>and<\/em> cut costs. That is not strategy.<\/span>\n    <\/div>\n    <div style=\"background:rgba(107,92,231,.10);border:1px solid rgba(107,92,231,.28);border-radius:12px;padding:24px 28px\">\n      <p style=\"font-size:27px;color:var(--vlight);font-style:italic;line-height:1.5\">&ldquo;A firm stuck in the middle &hellip; is <strong style=\"color:#fff\">almost guaranteed to have low profitability.<\/strong>&rdquo;<\/p>\n      <p style=\"font-size:20px;color:var(--muted);margin-top:10px\">&mdash; Michael Porter, Competitive Strategy (1980)<\/p>\n    <\/div>\n  <\/div>\n  <!-- Right: 3 action cards -->\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:72px 88px;gap:20px;position:relative\">\n    <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 65% 50%,rgba(107,92,231,.08) 0%,transparent 65%);pointer-events:none\"><\/div>\n    <div class=\"t-label violet\" style=\"margin-bottom:8px;position:relative;z-index:1\">How to use AI for strategy<\/div>\n    <div style=\"display:flex;flex-direction:column;gap:16px;position:relative;z-index:1\">\n      <div class=\"card\" style=\"display:flex;gap:18px;align-items:flex-start;padding:28px 32px\">\n        <div style=\"width:6px;min-height:44px;background:linear-gradient(180deg,#9B8FFF,#5040C0);border-radius:3px;flex-shrink:0;margin-top:2px\"><\/div>\n        <div>\n          <div class=\"t-label violet\" style=\"margin-bottom:6px\">Expand Options, Not Decisions<\/div>\n          <div style=\"font-size:26px;color:var(--muted);line-height:1.4\">Use AI to surface risks and alternatives &mdash; keep the final call <strong style=\"color:#fff\">human<\/strong>.<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"card\" style=\"display:flex;gap:18px;align-items:flex-start;padding:28px 32px\">\n        <div style=\"width:6px;min-height:44px;background:linear-gradient(180deg,#F5A500,#B07000);border-radius:3px;flex-shrink:0;margin-top:2px\"><\/div>\n        <div>\n          <div class=\"t-label amber\" style=\"margin-bottom:6px\">Counteract the Bias<\/div>\n          <div style=\"font-size:26px;color:var(--muted);line-height:1.4\">If AI says differentiate, demand its best case for cost leadership. Flip the framing.<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"card card-anchor\" style=\"display:flex;gap:18px;align-items:flex-start;padding:28px 32px\">\n        <div style=\"width:6px;min-height:44px;background:linear-gradient(180deg,#00D4F0,#007090);border-radius:3px;flex-shrink:0;margin-top:2px\"><\/div>\n        <div>\n          <div class=\"t-label\" style=\"color:#00D4F0;margin-bottom:6px\">Spot the Red Flag<\/div>\n          <div style=\"font-size:26px;color:var(--muted);line-height:1.4\">&ldquo;Do both&rdquo; is a signal to think harder &mdash; not an answer. Strategy without sacrifice is not strategy.<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 07 WHY SIMULATION ===== -->\n<section data-label=\"10 Why Simulation\">\n  <div class=\"slide-label violet\">Why Simulation<\/div>\n  <h2 class=\"t-title\" style=\"margin-bottom:12px\">The highest-leverage investment<br>in human performance<\/h2>\n  <p class=\"t-body muted\" style=\"margin-bottom:48px\">Simulations compress years of experience into hours of practice.<\/p>\n  <div class=\"g4\" style=\"flex:1\">\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:18px\">\n      <div class=\"t-label\" style=\"color:var(--vlight)\">01 \u00b7 Leadership<\/div>\n      <div style=\"font-size:34px;font-weight:700;line-height:1.2\">Turn theory into instinct<\/div>\n      <p class=\"t-small muted\" style=\"flex:1\">Leaders learn by deciding under budget pressure, stakeholder friction, and competitive threat.<\/p>\n      <div style=\"background:rgba(107,92,231,0.1);border-radius:12px;padding:22px 24px;min-height:140px;display:flex;flex-direction:column;justify-content:center\">\n        <div class=\"t-stat\" style=\"color:var(--vlight);letter-spacing:-1px;font-size:48px\">Faster<\/div>\n        <div class=\"t-small muted\" style=\"margin-top:4px\">skill transfer &amp; better retention vs. classroom<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:18px\">\n      <div class=\"t-label\" style=\"color:var(--amber)\">02 \u00b7 Team Alignment<\/div>\n      <div style=\"font-size:34px;font-weight:700;line-height:1.2\">Surface gaps before they cost you<\/div>\n      <p class=\"t-small muted\" style=\"flex:1\">Misalignments in strategic priorities and risk appetite become visible fast.<\/p>\n      <div style=\"background:rgba(245,165,0,0.1);border-radius:12px;padding:22px 24px;min-height:140px;display:flex;flex-direction:column;justify-content:center\">\n        <div class=\"t-small muted\" style=\"margin-bottom:4px\">Strategy Quest participants report<\/div>\n        <div style=\"font-size:38px;font-weight:800;color:var(--amber);letter-spacing:-1px;line-height:1.1\">improved team clarity<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:18px\">\n      <div class=\"t-label\" style=\"color:var(--vlight)\">03 \u00b7 Strategy Validation<\/div>\n      <div style=\"font-size:34px;font-weight:700;line-height:1.2\">Test strategies consequence-free<\/div>\n      <p class=\"t-small muted\" style=\"flex:1\">Before a major pivot or investment, run it through a simulation and see where it breaks.<\/p>\n      <div style=\"background:rgba(107,92,231,0.1);border-radius:12px;padding:22px 24px;min-height:140px;display:flex;flex-direction:column;justify-content:center\">\n        <div class=\"t-stat\" style=\"color:var(--vlight)\">5<\/div>\n        <div class=\"t-small muted\" style=\"margin-top:4px\">rounds to pressure-test a multi-year strategy<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:18px\">\n      <div class=\"t-label\" style=\"color:var(--amber)\">04 \u00b7 Change Readiness<\/div>\n      <div style=\"font-size:34px;font-weight:700;line-height:1.2\">Prepare people for what's coming<\/div>\n      <p class=\"t-small muted\" style=\"flex:1\">Build cognitive and emotional muscle memory for operating in ambiguity \u2014 before the real change hits.<\/p>\n      <div style=\"background:rgba(245,165,0,0.1);border-radius:12px;padding:22px 24px;min-height:140px;display:flex;flex-direction:column;justify-content:center\">\n        <div style=\"font-size:38px;font-weight:800;color:var(--amber);letter-spacing:-1px;line-height:1.15\">Learn to expect<br>the unexpected<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 09 HOW IT WORKS ===== -->\n<section data-label=\"12 How It Works\">\n  <div class=\"slide-label\">Simulation Structure<\/div>\n  <h2 class=\"t-title\" style=\"margin-bottom:48px\">How the simulation works<\/h2>\n  <div class=\"g3\" style=\"flex:1;align-items:stretch\">\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:20px;position:relative;overflow:hidden;z-index:1\">\n      <div class=\"step-tag\">Step 01<\/div>\n      <h3 style=\"font-size:38px;font-weight:700;line-height:1.2\">Receive the briefing<\/h3>\n      <p class=\"t-body muted\" style=\"flex:1\">Your team receives an update \u2014 company context, market conditions, a stakeholder map, and the strategic challenge you need to navigate.<\/p>\n      <div style=\"height:3px;background:linear-gradient(90deg,var(--violet),transparent);border-radius:2px;margin-top:8px\"><\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:20px;position:relative;overflow:hidden\">\n      <div class=\"step-tag\" style=\"background:rgba(245,165,0,0.14);color:var(--amber)\">Step 02<\/div>\n      <h3 style=\"font-size:38px;font-weight:700;line-height:1.2\">Build your strategy<\/h3>\n      <p class=\"t-body muted\" style=\"flex:1\">Make strategic decisions under time pressure. Define priorities, allocate resources, and interact with AI-powered stakeholders who react to every choice.<\/p>\n      <div style=\"height:3px;background:linear-gradient(90deg,var(--amber),transparent);border-radius:2px;margin-top:8px\"><\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:20px;position:relative;overflow:hidden\">\n      <div class=\"step-tag\">Step 03<\/div>\n      <h3 style=\"font-size:38px;font-weight:700;line-height:1.2\">Adapt &amp; refine<\/h3>\n      <p class=\"t-body muted\" style=\"flex:1\">Receive stakeholder feedback. The world evolves. Round two strategy must account for the consequences of your first decisions \u2014 there are no neutral choices.<\/p>\n      <div style=\"height:3px;background:linear-gradient(90deg,var(--violet),transparent);border-radius:2px;margin-top:8px\"><\/div>\n    <\/div>\n  <\/div>\n  <p class=\"t-small muted\" style=\"margin-top:36px;text-align:center\">Every choice shapes the world you operate in next round<\/p>\n  <div style=\"margin-top:32px;text-align:center\">\n    <a href=\"https://demo1.strategy-quest.com/LID2026\"\n       target=\"_blank\"\n       style=\"font-size:46px;font-weight:700;color:#00D4F0;text-decoration:underline;text-underline-offset:8px;letter-spacing:0.01em;transition:opacity 0.2s\"\n       onmouseover=\"this.style.opacity='0.75'\"\n       onmouseout=\"this.style.opacity='1'\">demo1.strategy-quest.com/LID2026<\/a>\n  <\/div>\n<\/section>\n\n<!-- ===== 10 TEAM FORMATION ===== -->\n<section class=\"centered\" data-label=\"13 Team Formation\" style=\"background:#0d0d1a\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, rgba(245,165,0,0.1) 0%, transparent 65%);pointer-events:none\"><\/div>\n  <div class=\"t-label amber\" style=\"margin-bottom:20px\">Now \u00b7 5 minutes<\/div>\n  <h2 class=\"t-hero\" style=\"margin-bottom:20px\">Team Formation<\/h2>\n  <p class=\"t-sub muted\" style=\"margin-bottom:56px;max-width:860px\">Form groups of 4\u20135 people.<br>Mix organisations and functions where possible.<\/p>\n  <div id=\"timer-team\"><\/div>\n  <div style=\"margin-top:36px;text-align:center\">\n    <a href=\"https://demo1.strategy-quest.com/LID2026\"\n       target=\"_blank\"\n       style=\"font-size:46px;font-weight:700;color:#00D4F0;text-decoration:underline;text-underline-offset:8px;letter-spacing:0.01em\"\n       onmouseover=\"this.style.opacity='0.75'\"\n       onmouseout=\"this.style.opacity='1'\">demo1.strategy-quest.com/LID2026<\/a>\n  <\/div>\n<\/section>\n\n<!-- ===== 11 ROUND 1 ===== -->\n<section class=\"no-pad\" data-label=\"14 Round 1\" style=\"flex-direction:row;background:#0d0d1a\">\n  <div class=\"bg-num\">1<\/div>\n  <div style=\"flex:0 0 780px;display:flex;flex-direction:column;justify-content:center;padding:96px 96px 80px 120px;border-right:1px solid var(--border);position:relative;z-index:1\">\n    <div class=\"slide-label violet\">Round 01 \u00b7 20 minutes<\/div>\n    <h2 class=\"t-title\" style=\"margin-bottom:24px\">Create your<br>first strategy<\/h2>\n    <div class=\"divider\"><\/div>\n    <div style=\"display:flex;flex-direction:column;gap:22px;margin-top:8px\">\n      <div class=\"t-body\" style=\"display:flex;gap:20px;align-items:flex-start\"><span class=\"violet\" style=\"flex-shrink:0\">01<\/span> Review the scenario briefing<\/div>\n      <div class=\"t-body\" style=\"display:flex;gap:20px;align-items:flex-start\"><span class=\"violet\" style=\"flex-shrink:0\">02<\/span> Interact with your AI stakeholders<\/div>\n      <div class=\"t-body\" style=\"display:flex;gap:20px;align-items:flex-start\"><span class=\"violet\" style=\"flex-shrink:0\">03<\/span> Align on a strategic direction<\/div>\n      <div class=\"t-body\" style=\"display:flex;gap:20px;align-items:flex-start\"><span class=\"violet\" style=\"flex-shrink:0\">04<\/span> Receive feedback &amp; submit your final strategy<\/div>\n    <\/div>\n  <\/div>\n  <div style=\"flex:1;display:flex;align-items:center;justify-content:flex-start;padding:80px 80px 80px 80px;position:relative;z-index:1\">\n    <div id=\"timer-r1\"><\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 12 ELEMENT OF DISRUPTION ===== -->\n<section class=\"centered\" data-label=\"15 Element of Disruption\" style=\"background:#0a060a\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%, rgba(200,40,40,0.18) 0%, transparent 60%);pointer-events:none\"><\/div>\n  <!-- SVG lightning bolt -->\n  <div style=\"position:absolute;inset:0;overflow:hidden;pointer-events:none;opacity:0.07\">\n    <svg width=\"100%\" height=\"100%\" viewBox=\"0 0 1920 1080\">\n      <line x1=\"960\" y1=\"0\" x2=\"860\" y2=\"400\" stroke=\"#FF6B6B\" stroke-width=\"3\"><\/line>\n      <line x1=\"860\" y1=\"400\" x2=\"1020\" y2=\"400\" stroke=\"#FF6B6B\" stroke-width=\"3\"><\/line>\n      <line x1=\"1020\" y1=\"400\" x2=\"880\" y2=\"1080\" stroke=\"#FF6B6B\" stroke-width=\"3\"><\/line>\n    <\/svg>\n  <\/div>\n  <!-- Disruption pulse rings -->\n  <div id=\"disruption-rings\" style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none\"><\/div>\n  <div class=\"t-label\" style=\"color:rgba(255,100,100,0.85);margin-bottom:24px;position:relative;z-index:1\">Scenario Trigger<\/div>\n  <h2 style=\"font-size:96px;font-weight:900;line-height:1;margin-bottom:28px;position:relative;z-index:1;color:#fff\">Did you Expect the<br>Unexpected?<\/h2>\n  <p class=\"t-sub\" style=\"color:rgba(255,180,180,0.75);max-width:860px;margin-bottom:52px;position:relative;z-index:1\">A market disruption has just been introduced into your simulation. Your strategies are about to be tested under real pressure in round 2.<\/p>\n  <div style=\"display:flex;gap:40px;position:relative;z-index:1\">\n    <div class=\"card\" style=\"border-color:rgba(255,100,100,0.25);padding:32px 48px;text-align:center\">\n      <div style=\"font-size:36px;font-weight:700;color:rgba(255,130,130,0.9);margin-bottom:8px\">Round 1 complete<\/div>\n      <div class=\"t-small muted\">Stakeholder feedback delivered<\/div>\n    <\/div>\n    <div class=\"card\" style=\"border-color:rgba(245,165,0,0.3);padding:32px 48px;text-align:center\">\n      <div style=\"font-size:36px;font-weight:700;color:var(--amber);margin-bottom:8px\">10 min to reflect &amp; discuss<\/div>\n      <div class=\"t-small muted\">Will you pivot or persevere?<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 13 ROUND 2 ===== -->\n<section class=\"no-pad\" data-label=\"16 Round 2\" style=\"flex-direction:row;background:#0d0d1a\">\n  <div class=\"bg-num\" style=\"color:var(--amber)\">2<\/div>\n  <div style=\"flex:0 0 780px;display:flex;flex-direction:column;justify-content:center;padding:96px 96px 80px 120px;border-right:1px solid var(--border);position:relative;z-index:1\">\n    <div class=\"slide-label amber\">Round 02 \u00b7 10 minutes<\/div>\n    <h2 class=\"t-title\" style=\"margin-bottom:24px\">Reflect on your<br>strategy<\/h2>\n    <div class=\"divider\"><\/div>\n    <div style=\"display:flex;flex-direction:column;gap:22px;margin-top:8px\">\n      <div class=\"t-body\" style=\"display:flex;gap:20px;align-items:flex-start\"><span class=\"amber\" style=\"flex-shrink:0\">01<\/span> Review round 1 stakeholder feedback<\/div>\n      <div class=\"t-body\" style=\"display:flex;gap:20px;align-items:flex-start\"><span class=\"amber\" style=\"flex-shrink:0\">02<\/span> Adapt your priorities<\/div>\n      <div class=\"t-body\" style=\"display:flex;gap:20px;align-items:flex-start\"><span class=\"amber\" style=\"flex-shrink:0\">03<\/span> Decision: Pivot (restart the Quest) or Persevere (continue)?<\/div>\n      <div class=\"t-body\" style=\"display:flex;gap:20px;align-items:flex-start\"><span class=\"amber\" style=\"flex-shrink:0\">04<\/span> Share your thinking with us<\/div>\n    <\/div>\n  <\/div>\n  <div style=\"flex:1;display:flex;align-items:center;justify-content:flex-start;padding:80px;position:relative;z-index:1\">\n    <div id=\"timer-r2\"><\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 14 BUILD SIM ===== -->\n<section class=\"no-pad\" data-label=\"17 Design Your Simulation\" style=\"flex-direction:row\">\n  <!-- Left -->\n  <div style=\"flex:0 0 600px;display:flex;flex-direction:column;justify-content:center;padding:96px 72px;border-right:1px solid var(--border);background:rgba(245,165,0,0.04)\">\n    <div class=\"slide-label amber\">Workshop Activity \u00b7 35 min<\/div>\n    <h2 class=\"t-title\" style=\"margin-bottom:20px\">Design your<br>own simulation<\/h2>\n    <p class=\"t-body muted\" style=\"margin-bottom:40px\">Apply the Strategy Quest method to a real challenge in your organisation.<\/p>\n    <div id=\"timer-sim\"><\/div>\n  <\/div>\n  <!-- Steps -->\n  <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;padding:72px 96px;gap:32px\">\n    <div class=\"card\" style=\"display:flex;gap:28px;align-items:flex-start\">\n      <div class=\"step-tag\" style=\"flex-shrink:0;margin-bottom:0\">Step 01<\/div>\n      <div>\n        <div style=\"font-size:32px;font-weight:700;margin-bottom:10px\">Company Design<\/div>\n        <p class=\"t-small muted\">Define your organisation's structure, competitive context, and the strategic objectives at stake.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;gap:28px;align-items:flex-start\">\n      <div class=\"step-tag\" style=\"flex-shrink:0;margin-bottom:0;background:rgba(245,165,0,0.14);color:var(--amber)\">Step 02<\/div>\n      <div>\n        <div style=\"font-size:32px;font-weight:700;margin-bottom:10px\">Stakeholder Design<\/div>\n        <p class=\"t-small muted\">Map 3\u20135 key stakeholders \u2014 their roles, motivations, and how they respond to strategic decisions.<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;gap:28px;align-items:flex-start\">\n      <div class=\"step-tag\" style=\"flex-shrink:0;margin-bottom:0\">Step 03<\/div>\n      <div>\n        <div style=\"font-size:32px;font-weight:700;margin-bottom:10px\">Simulation Briefing<\/div>\n        <p class=\"t-small muted\">Write the scenario: the challenge, the constraints, and the outcome you want participants to navigate.<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 11b NEXT STEPS ===== -->\n<section class=\"centered\" data-label=\"11b Next Steps\" style=\"background:#09090f\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(107,92,231,0.14) 0%,transparent 60%);pointer-events:none\"><\/div>\n  <div class=\"slide-label\" style=\"margin-bottom:20px\">After Today<\/div>\n  <h2 class=\"t-title\" style=\"margin-bottom:16px\">Your Quest continues beyond this room.<\/h2>\n  <p class=\"t-body muted\" style=\"margin-bottom:52px;max-width:860px\">Three things to do when you&rsquo;re back at the office.<\/p>\n  <div class=\"g3\" style=\"width:100%;position:relative;z-index:1\">\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:20px;text-align:left\">\n      <div style=\"width:48px;height:48px;border-radius:12px;background:rgba(107,92,231,0.15);border:1px solid rgba(107,92,231,0.30);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#9B8FFF\">1<\/div>\n      <div style=\"font-size:34px;font-weight:700;line-height:1.2;color:#fff\">Restart the Aeki sim &mdash; and show it to someone<\/div>\n      <p class=\"t-small muted\" style=\"flex:1\">Log back in, replay the simulation, and share it with a colleague or your team. The best learning multiplies when it spreads.<\/p>\n      <div style=\"height:3px;background:linear-gradient(90deg,var(--violet),transparent);border-radius:2px\"><\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:20px;text-align:left\">\n      <div style=\"width:48px;height:48px;border-radius:12px;background:rgba(245,165,0,0.13);border:1px solid rgba(245,165,0,0.30);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#F5A500\">2<\/div>\n      <div style=\"font-size:34px;font-weight:700;line-height:1.2;color:#fff\">Design one or more new simulations<\/div>\n      <p class=\"t-small muted\" style=\"flex:1\">Use today&rsquo;s design framework on a real strategic challenge. The more specific to your context, the more powerful the learning.<\/p>\n      <div style=\"height:3px;background:linear-gradient(90deg,var(--amber),transparent);border-radius:2px\"><\/div>\n    <\/div>\n    <div class=\"card\" style=\"display:flex;flex-direction:column;gap:20px;text-align:left\">\n      <div style=\"width:48px;height:48px;border-radius:12px;background:rgba(0,212,240,0.10);border:1px solid rgba(0,212,240,0.30);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#00D4F0\">3<\/div>\n      <div style=\"font-size:34px;font-weight:700;line-height:1.2;color:#fff\">Reach out &mdash; let&rsquo;s keep going<\/div>\n      <p class=\"t-small muted\" style=\"flex:1\">Want a bespoke simulation for your organisation? Curious about a full deployment? We&rsquo;d love to continue the conversation.<\/p>\n      <div style=\"height:3px;background:linear-gradient(90deg,#00D4F0,transparent);border-radius:2px\"><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ===== 15 CLOSING ===== -->\n<section class=\"centered\" data-label=\"18 Closing\" style=\"background:#0b0b13\">\n  <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%, rgba(107,92,231,0.18) 0%, transparent 65%);pointer-events:none\"><\/div>\n  <img src=\"33962f65-be34-4de8-950f-b0793e580596\" style=\"height:90px;mix-blend-mode:screen;margin-bottom:24px\">\n  <h2 class=\"t-hero\" style=\"margin-bottom:20px\">Thank you.<\/h2>\n  <p class=\"t-sub muted\" style=\"max-width:860px;margin-bottom:56px\">The leaders who practice navigating ambiguity today<br>will be better prepared when it's real.<\/p>\n  <div class=\"t-body\" style=\"color:var(--vlight)\">strategy-quest.com<\/div>\n  <!-- Founders + QR -->\n  <div style=\"display:flex;align-items:flex-start;justify-content:center;gap:72px;margin-top:48px\">\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/6a01a00402a485177b51637c_fedf87b0a42d6a1c5c7b562230b604ef_Jasper%20Verbeek.avif\"\n           alt=\"Jasper Verbeek\"\n           style=\"width:112px;height:112px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid rgba(155,143,255,0.45);flex-shrink:0\">\n      <div style=\"text-align:center\">\n        <div style=\"font-size:24px;font-weight:600;color:#fff;margin-bottom:6px\">Jasper Verbeek<\/div>\n        <a href=\"mailto:jasper@strategy-quest.com\"\n           style=\"font-size:22px;color:var(--vlight);text-decoration:none\"\n           onmouseover=\"this.style.textDecoration='underline'\"\n           onmouseout=\"this.style.textDecoration='none'\">jasper@strategy-quest.com<\/a>\n      <\/div>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:14px\">\n      <img src=\"https://cdn.prod.website-files.com/68248f0b419b4d538e199dad/6836b389115d953ff3091abe_Stephen%20Parkins.avif\"\n           alt=\"Stephen Parkins\"\n           style=\"width:112px;height:112px;border-radius:50%;object-fit:cover;object-position:top;border:2px solid rgba(155,143,255,0.45);flex-shrink:0\">\n      <div style=\"text-align:center\">\n        <div style=\"font-size:24px;font-weight:600;color:#fff;margin-bottom:6px\">Stephen Parkins<\/div>\n        <a href=\"mailto:stephen@strategy-quest.com\"\n           style=\"font-size:22px;color:var(--vlight);text-decoration:none\"\n           onmouseover=\"this.style.textDecoration='underline'\"\n           onmouseout=\"this.style.textDecoration='none'\">stephen@strategy-quest.com<\/a>\n      <\/div>\n    <\/div>\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:12px\">\n      <div style=\"background:#fff;padding:8px;border-radius:14px;line-height:0\">\n        <img src=\"https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://demo1.strategy-quest.com/LID2026\"\n             alt=\"QR code \u2014 sign up\"\n             style=\"width:120px;height:120px;display:block\">\n      <\/div>\n      <div style=\"font-size:22px;color:var(--muted);text-align:center\">Try it free<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<\/deck-stage>\n\n<!-- ==========================================\n     GLOBE CANVAS ENGINE\n     ========================================== -->\n<script>\n(function() {\n  // Simplified land bounding boxes [minLon, minLat, maxLon, maxLat]\n  const BOUNDS = [\n    [-168,25,-52,72],  // N. America\n    [-92,7,-60,25],    // C. America + Caribbean\n    [-81,-55,-34,12],  // S. America\n    [-55,60,-17,84],   // Greenland\n    [-9,36,42,70],     // Europe\n    [-8,50,2,62],      // UK / Ireland\n    [5,56,30,71],      // Scandinavia\n    [-18,15,52,37],    // N. Africa\n    [-18,-35,52,15],   // Sub-Saharan Africa\n    [43,-26,51,-12],   // Madagascar\n    [32,12,62,38],     // Middle East / Arabian Peninsula\n    [25,50,180,75],    // Russia / Siberia\n    [50,35,130,55],    // Central Asia / China\n    [60,5,93,35],      // South Asia\n    [100,20,145,53],   // E. Asia (China/Korea/Japan)\n    [95,-10,140,20],   // SE Asia\n    [114,-40,154,-11], // Australia\n    [166,-46,178,-34], // New Zealand\n    [-180,-90,180,-72] // Antarctica\n  ];\n\n  function isLand(lat, lon) {\n    for (const [x0,y0,x1,y1] of BOUNDS)\n      if (lat >= y0 && lat <= y1 && lon >= x0 && lon <= x1) return true;\n    return false;\n  }\n\n  // Pre-generate land dot positions (in radians)\n  const DOTS = [];\n  for (let lat = -90; lat <= 90; lat += 3)\n    for (let lon = -180; lon <= 180; lon += 3)\n      if (isLand(lat, lon)) DOTS.push([lat * Math.PI/180, lon * Math.PI/180]);\n\n  const HOTSPOTS = {\n    world: [\n      {lat:75,  lon:-25,  label:'Arctic',    phase:0, color:'#F5A500'},\n      {lat:-5,  lon:-60,  label:'Amazon',    phase:1, color:'#F5A500'},\n      {lat:50,  lon:30,   label:'Conflict',  phase:2, color:'#FF6B6B'},\n      {lat:37,  lon:-122, label:'AI Hub',    phase:3, color:'#00D4F0'},\n      {lat:40,  lon:116,  label:'AI Hub',    phase:4, color:'#00D4F0'},\n      {lat:-5,  lon:25,   label:'Minerals',  phase:5, color:'#F5A500'},\n    ],\n    ai: [\n      {lat:37,  lon:-122, label:'Silicon Valley', phase:0, color:'#00D4F0'},\n      {lat:40,  lon:116,  label:'Beijing',        phase:1, color:'#00D4F0'},\n      {lat:51,  lon:0,    label:'London',         phase:2, color:'#00D4F0'},\n      {lat:48,  lon:2,    label:'Paris',          phase:3, color:'#00D4F0'},\n      {lat:1,   lon:104,  label:'Singapore',      phase:4, color:'#00D4F0'},\n      {lat:37,  lon:127,  label:'Seoul',          phase:5, color:'#00D4F0'},\n      {lat:35,  lon:139,  label:'Tokyo',          phase:6, color:'#00D4F0'},\n    ],\n    env: [\n      {lat:75,  lon:-25,  label:'Arctic',    phase:0, color:'#50D278'},\n      {lat:-5,  lon:-60,  label:'Amazon',    phase:1, color:'#50D278'},\n      {lat:-23, lon:135,  label:'Australia', phase:2, color:'#50D278'},\n      {lat:14,  lon:15,   label:'Sahel',     phase:3, color:'#50D278'},\n      {lat:0,   lon:115,  label:'Coral Sea', phase:4, color:'#50A0DC'},\n      {lat:65,  lon:25,   label:'Boreal',    phase:5, color:'#50D278'},\n    ],\n    geo: [\n      {lat:50,  lon:30,   label:'Conflict Zone',   phase:0, color:'#FF6B6B'},\n      {lat:25,  lon:55,   label:'Gulf',            phase:1, color:'#F5A500'},\n      {lat:15,  lon:115,  label:'S.China Sea',     phase:2, color:'#FF6B6B'},\n      {lat:45,  lon:65,   label:'Resource Corridor',phase:3,color:'#F5A500'},\n      {lat:-5,  lon:25,   label:'Critical Minerals',phase:4,color:'#F5A500'},\n      {lat:23,  lon:120,  label:'Taiwan Strait',   phase:5, color:'#FF6B6B'},\n    ]\n  };\n\n  function drawGlobe(canvas, rotation, hotspots, dotRgb) {\n    if (!canvas) return;\n    const W = canvas.width, H = canvas.height;\n    const ctx = canvas.getContext('2d');\n    const cx = W/2, cy = H/2, R = Math.min(W,H) * 0.44;\n    ctx.clearRect(0, 0, W, H);\n\n    // Sphere fill\n    const sg = ctx.createRadialGradient(cx-R*0.3, cy-R*0.35, R*0.05, cx, cy, R);\n    sg.addColorStop(0, 'rgba(55,45,155,0.92)');\n    sg.addColorStop(0.55, 'rgba(14,11,38,0.97)');\n    sg.addColorStop(1, 'rgba(11,11,19,1)');\n    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);\n    ctx.fillStyle = sg; ctx.fill();\n\n    // Land dots\n    const rotR = rotation * Math.PI / 180;\n    for (const [latR, lonR] of DOTS) {\n      const adjL = lonR + rotR;\n      const x3 = Math.cos(latR) * Math.sin(adjL);\n      const y3 = Math.sin(latR);\n      const z3 = Math.cos(latR) * Math.cos(adjL);\n      if (z3 < 0) continue;\n      ctx.beginPath();\n      ctx.arc(cx + R*x3, cy - R*y3, 2.5, 0, Math.PI*2);\n      ctx.fillStyle = `rgba(${dotRgb}, ${0.28 + z3 * 0.58})`;\n      ctx.fill();\n    }\n\n    // Graticule\n    [0, 30, -30, 60, -60].forEach(deg => {\n      const phi = deg * Math.PI/180;\n      const rx = R * Math.cos(phi);\n      const offY = -R * Math.sin(phi);\n      if (rx < 5) return;\n      ctx.beginPath();\n      ctx.ellipse(cx, cy + offY, rx, rx * 0.08, 0, 0, Math.PI*2);\n      ctx.strokeStyle = deg===0 ? 'rgba(255,255,255,0.13)' : 'rgba(255,255,255,0.055)';\n      ctx.lineWidth = 1; ctx.stroke();\n    });\n    // Two meridians\n    [0, Math.PI/2].forEach(off => {\n      const lon2 = rotR + off;\n      const sinL = Math.sin(lon2);\n      if (Math.abs(sinL) > 0.08) {\n        ctx.beginPath();\n        ctx.ellipse(cx, cy, Math.abs(R*sinL), R, 0, 0, Math.PI*2);\n        ctx.strokeStyle = 'rgba(255,255,255,0.055)';\n        ctx.lineWidth = 1; ctx.stroke();\n      }\n    });\n\n    // Outer glow halo\n    const halo = ctx.createRadialGradient(cx,cy,R*0.82,cx,cy,R*1.18);\n    halo.addColorStop(0,'rgba(107,92,231,0)');\n    halo.addColorStop(0.45,'rgba(107,92,231,0.22)');\n    halo.addColorStop(1,'rgba(107,92,231,0)');\n    ctx.beginPath(); ctx.arc(cx,cy,R*1.18,0,Math.PI*2);\n    ctx.fillStyle = halo; ctx.fill();\n\n    // Outline\n    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);\n    ctx.strokeStyle='rgba(107,92,231,0.65)'; ctx.lineWidth=2; ctx.stroke();\n\n    // Interconnection arcs between related disruptions\n    if (hotspots.length > 2) {\n      const connections = [];\n      // Connect pairs that share thematic links\n      for (let i = 0; i < hotspots.length; i++) {\n        for (let j = i+1; j < hotspots.length; j++) {\n          const a = hotspots[i], b = hotspots[j];\n          // Connect different-colored hotspots (cross-theme connections)\n          if (a.color !== b.color) connections.push([a, b, 'rgba(255,255,255,0.12)']);\n          // Connect same-type cl
