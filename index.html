ose pairs\n          else if (a.color === b.color) connections.push([a, b, a.color]);\n        }\n      }\n      connections.forEach(([h1, h2, colStr]) => {\n        const phi1 = h1.lat*Math.PI/180, lam1 = h1.lon*Math.PI/180 + rotR;\n        const phi2 = h2.lat*Math.PI/180, lam2 = h2.lon*Math.PI/180 + rotR;\n        const v1 = [Math.cos(phi1)*Math.sin(lam1), Math.sin(phi1), Math.cos(phi1)*Math.cos(lam1)];\n        const v2 = [Math.cos(phi2)*Math.sin(lam2), Math.sin(phi2), Math.cos(phi2)*Math.cos(lam2)];\n        const dot = Math.max(-1, Math.min(1, v1[0]*v2[0]+v1[1]*v2[1]+v1[2]*v2[2]));\n        const omega = Math.acos(dot);\n        const sinO = Math.sin(omega);\n        if (sinO < 0.01) return;\n        let started = false;\n        ctx.beginPath();\n        for (let s = 0; s <= 40; s++) {\n          const u = s/40;\n          const f1 = Math.sin((1-u)*omega)/sinO, f2 = Math.sin(u*omega)/sinO;\n          const p = [f1*v1[0]+f2*v2[0], f1*v1[1]+f2*v2[1], f1*v1[2]+f2*v2[2]];\n          if (p[2] < 0) { started = false; continue; }\n          const px = cx+R*p[0], py = cy-R*p[1];\n          if (!started) { ctx.moveTo(px,py); started=true; } else ctx.lineTo(px,py);\n        }\n        // Parse color for rgba\n        let [r2,g2,b2] = colStr.startsWith('rgba') ? [255,255,255] :\n          colStr==='#FF6B6B'?[255,107,107]:colStr==='#F5A500'?[245,165,0]:\n          colStr==='#50D278'?[80,210,120]:colStr==='#00D4F0'?[0,212,240]:[155,143,255];\n        const tNow = Date.now();\n        const alpha = colStr.startsWith('rgba') ? 0.1 : 0.18 + 0.08*Math.sin(tNow/1200);\n        ctx.strokeStyle = `rgba(${r2},${g2},${b2},${alpha})`;\n        ctx.lineWidth = 1; ctx.stroke();\n      });\n    }\n\n    // Hotspot markers\n    const t = Date.now();\n    hotspots.forEach(h => {\n      const phi = h.lat * Math.PI/180;\n      const lam = h.lon * Math.PI/180 + rotR;\n      const x3 = Math.cos(phi)*Math.sin(lam);\n      const y3 = Math.sin(phi);\n      const z3 = Math.cos(phi)*Math.cos(lam);\n      if (z3 < 0.08) return;\n      const px = cx + R*x3, py = cy - R*y3;\n      const pulse = 0.5 + 0.5*Math.sin(t/650 + (h.phase||0)*1.1);\n      const pr = 9 + pulse*16;\n      // Ring\n      const [r,g,b] = h.color==='#FF6B6B' ? [255,107,107] : h.color==='#50D278' ? [80,210,120] : h.color==='#50A0DC' ? [80,160,220] : h.color==='#00D4F0' ? [0,212,240] : [245,165,0];\n      ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);\n      ctx.fillStyle=`rgba(${r},${g},${b},${0.07*pulse})`; ctx.fill();\n      ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2);\n      ctx.strokeStyle=`rgba(${r},${g},${b},${0.32*pulse})`; ctx.lineWidth=1.5; ctx.stroke();\n      // Center\n      let _centerAlpha = 1;\n      let _centerR = 5;\n      if (h.label === 'Conflict') {\n        const _s2 = Math.sin(t/420);\n        const _flash = Math.pow(Math.max(0,_s2), 5);\n        _centerAlpha = 0.45 + 0.55 * _flash;\n        _centerR = 5 + 3 * _flash;\n      }\n      ctx.beginPath(); ctx.arc(px,py,_centerR,0,Math.PI*2);\n      ctx.fillStyle=`rgba(${r},${g},${b},${_centerAlpha})`; ctx.fill();\n      // Label\n      if (h.label && z3 > 0.22) {\n        ctx.font='700 17px Outfit,sans-serif';\n        let _labAlpha = 0.92;\n        if (h.label === 'Conflict') {\n          const _s = Math.sin(t/420);\n          _labAlpha = 0.32 + 0.68 * Math.pow(Math.max(0,_s), 5);\n        }\n        ctx.fillStyle=`rgba(${r},${g},${b},${_labAlpha})`;\n        ctx.fillText(h.label, px+10, py-6);\n      }\n    });\n  }\n\n  // Rotation state per globe\n  const state = { main: 0, env: 120, geo: 240 };\n  const anims = {};\n\n  function startGlobe(id, key, dotRgb) {\n    const canvas = document.getElementById('globe-'+id);\n    if (!canvas) return;\n    if (anims[id]) cancelAnimationFrame(anims[id]);\n    function loop() {\n      drawGlobe(canvas, state[id], HOTSPOTS[key], dotRgb);\n      state[id] = (state[id] + 0.06) % 360;\n      anims[id] = requestAnimationFrame(loop);\n    }\n    loop();\n  }\n\n  function stopGlobe(id) {\n    if (anims[id]) { cancelAnimationFrame(anims[id]); delete anims[id]; }\n  }\n\n  window._globeCtrl = { startGlobe, stopGlobe };\n})();\n<\/script>\n\n<!-- ==========================================\n     NETWORK ANIMATION (Agentic AI slide)\n     ========================================== -->\n<script>\n(function() {\n  const NODES = Array.from({length: 28}, (_, i) => ({\n    x: 80 + Math.random() * 620,\n    y: 80 + Math.random() * 620,\n    vx: (Math.random() - 0.5) * 0.6,\n    vy: (Math.random() - 0.5) * 0.6,\n    r: 4 + Math.random() * 6,\n    pulse: Math.random() * Math.PI * 2\n  }));\n\n  function drawNetwork(canvas) {\n    if (!canvas) return;\n    const W = canvas.width, H = canvas.height;\n    const ctx = canvas.getContext('2d');\n    const t = Date.now();\n\n    ctx.clearRect(0, 0, W, H);\n\n    // Update positions\n    NODES.forEach(n => {\n      n.x += n.vx; n.y += n.vy;\n      if (n.x < 60 || n.x > W-60) n.vx *= -1;\n      if (n.y < 60 || n.y > H-60) n.vy *= -1;\n    });\n\n    // Draw edges\n    for (let i = 0; i < NODES.length; i++) {\n      for (let j = i+1; j < NODES.length; j++) {\n        const dx = NODES[i].x - NODES[j].x;\n        const dy = NODES[i].y - NODES[j].y;\n        const dist = Math.sqrt(dx*dx + dy*dy);\n        if (dist < 200) {\n          const alpha = (1 - dist/200) * 0.35;\n          ctx.beginPath();\n          ctx.moveTo(NODES[i].x, NODES[i].y);\n          ctx.lineTo(NODES[j].x, NODES[j].y);\n          ctx.strokeStyle = `rgba(107,92,231,${alpha})`;\n          ctx.lineWidth = 1;\n          ctx.stroke();\n        }\n      }\n    }\n\n    // Draw nodes\n    NODES.forEach((n, i) => {\n      const pulse = 0.5 + 0.5 * Math.sin(t/800 + n.pulse);\n      // Glow\n      const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r * 3);\n      const isAgent = i < 6;\n      const col = isAgent ? `rgba(245,165,0,` : `rgba(107,92,231,`;\n      grd.addColorStop(0, col + (0.4 * pulse) + ')');\n      grd.addColorStop(1, col + '0)');\n      ctx.beginPath();\n      ctx.arc(n.x, n.y, n.r * 3, 0, Math.PI*2);\n      ctx.fillStyle = grd; ctx.fill();\n      // Core\n      ctx.beginPath();\n      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);\n      ctx.fillStyle = isAgent ? '#F5A500' : '#9B8FFF';\n      ctx.globalAlpha = 0.7 + 0.3 * pulse;\n      ctx.fill();\n      ctx.globalAlpha = 1;\n    });\n  }\n\n  let netAnim;\n  window._networkCtrl = {\n    start() {\n      const canvas = document.getElementById('network-anim');\n      if (!canvas) return;\n      if (netAnim) cancelAnimationFrame(netAnim);\n      function loop() { drawNetwork(canvas); netAnim = requestAnimationFrame(loop); }\n      loop();\n    },\n    stop() { if (netAnim) { cancelAnimationFrame(netAnim); netAnim = null; } }\n  };\n})();\n<\/script>\n\n<!-- ==========================================\n     COUNTDOWN TIMER ENGINE\n     ========================================== -->\n<script>\nfunction buildTimer(containerId, totalSecs, accentHex, darkText) {\n  const container = document.getElementById(containerId);\n  if (!container) return null;\n  let rem = totalSecs, running = false, iv = null;\n\n  const wrap = document.createElement('div');\n  wrap.style.cssText = 'display:flex;flex-direction:column;gap:28px;align-items:flex-start';\n\n  const display = document.createElement('div');\n  display.className = 't-timer';\n  display.style.cssText = `color:${accentHex};letter-spacing:-6px`;\n\n  const row = document.createElement('div');\n  row.style.cssText = 'display:flex;gap:16px';\n\n  const startBtn = document.createElement('button');\n  startBtn.className = 'btn' + (darkText ? ' amber-btn' : '');\n  startBtn.style.cssText = `background:${accentHex};color:${darkText?'#000':'#fff'};font-size:26px;padding:14px 36px`;\n  startBtn.textContent = '\u25b6  Start';\n\n  const resetBtn = document.createElement('button');\n  resetBtn.className = 'btn ghost';\n  resetBtn.style.cssText = 'font-size:26px;padding:14px 28px';\n  resetBtn.textContent = '\u21ba  Reset';\n\n  function fmt(s) {\n    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');\n  }\n  function render() {\n    display.textContent = fmt(rem);\n    display.style.color = rem <= 60 ? '#FF5555' : accentHex;\n  }\n  function toggle() {\n    if (running) {\n      clearInterval(iv); running = false;\n      startBtn.textContent = '\u25b6  Resume';\n    } else if (rem > 0) {\n      iv = setInterval(() => {\n        rem--;\n        render();\n        if (rem <= 0) {\n          clearInterval(iv); running = false;\n          startBtn.textContent = '\u25b6  Start';\n          display.style.animation = 'flashDone 0.5s ease-in-out 6';\n          setTimeout(() => { display.style.animation = ''; }, 3200);\n        }\n      }, 1000);\n      running = true;\n      startBtn.textContent = '\u23f8  Pause';\n    }\n  }\n  function reset() {\n    clearInterval(iv); running = false;\n    rem = totalSecs;\n    startBtn.textContent = '\u25b6  Start';\n    render();\n  }\n\n  startBtn.addEventListener('click', toggle);\n  resetBtn.addEventListener('click', reset);\n  row.append(startBtn, resetBtn);\n  wrap.append(display, row);\n  container.appendChild(wrap);\n  render();\n  return { reset };\n}\n<\/script>\n\n<!-- ==========================================\n     ORCHESTRATION\n     ========================================== -->\n<script>\nlet ready = false;\n\nfunction init() {\n  if (ready) return;\n  ready = true;\n  buildTimer('timer-team', 5*60,  '#F5A500', true);\n  buildTimer('timer-r1',   20*60, '#9B8FFF', false);\n  buildTimer('timer-r2',   10*60, '#F5A500', true);\n  buildTimer('timer-sim',  35*60, '#F5A500', true);\n}\n\nconst GLOBE_MAP = {\n  5: ['main','world','140,130,255']\n};\n\nfunction onSlide(idx) {\n  init();\n  // Stop all globes\n  ['main','env','geo'].forEach(id => window._globeCtrl.stopGlobe(id));\n  // Stop network\n  if (window._networkCtrl) window._networkCtrl.stop();\n  // Start relevant globe\n  if (GLOBE_MAP[idx]) {\n    const [id,key,rgb] = GLOBE_MAP[idx];\n    window._globeCtrl.startGlobe(id, key, rgb);\n  }\n  // Start network on Agentic AI slide (index 4)\n  \n}\n\n// Receive slide changes from deck-stage (posts to window.parent; when not in iframe, parent===window)\nwindow.addEventListener('message', e => {\n  if (e.data && typeof e.data.slideIndexChanged === 'number') {\n    onSlide(e.data.slideIndexChanged);\n  }\n});\n\n// Fallback for initial load\ndocument.addEventListener('DOMContentLoaded', () => {\n  init();\n  // Deck-stage posts slideIndexChanged on init, but fire globe for slide 0 just in case\n  onSlide(0);\n});\n<\/script>\n\n\n\n<script>\n(function(){\n  function animCount(el,target,suf,dur){\n    var s=Date.now();\n    (function tick(){\n      var p=Math.min(1,(Date.now()-s)/dur), e=1-Math.pow(1-p,3);\n      el.textContent=Math.round(e*target)+(suf===\"x\"?\"\u00d7\":\"%\");\n      if(p<1)requestAnimationFrame(tick);\n      else el.textContent=target+(suf===\"x\"?\"\u00d7\":\"%\");\n    })();\n  }\n  window.addEventListener(\"message\",function(ev){\n    if(!ev.data||ev.data.slideIndexChanged!==2)return;\n    var sec=document.querySelector('section[data-label=\"02 Strategy Quest\"]');\n    if(!sec)return;\n    sec.querySelectorAll(\"[data-count]\").forEach(function(el){\n      animCount(el,+el.dataset.count,el.dataset.suffix||\"%\",1200);\n    });\n  });\n})();\n<\/script>\n<\/body><\/html>"</script>
